<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4332"/>
      <stop offset="100%" style="stop-color:#2D6A4F"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1B4332" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Square icon -->
  <rect width="100" height="100" rx="22" fill="url(#g)" filter="url(#s)"/>

  <!-- অ letter -->
  <text
    x="50" y="56"
    font-family="'Noto Serif Bengali', serif"
    font-size="56"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
  >অ</text>

  <!-- Gold arc -->
  <path d="M 22 76 Q 50 60 78 76" stroke="#D4A017" stroke-width="4.5" fill="none" stroke-linecap="round"/>
